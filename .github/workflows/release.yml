name: Build & Release

# 触发条件：
#   1. push 到 main → 在线编译 + 上传 artifact（可从 Actions 页下载）
#   2. push v* 标签 → 编译 + 创建 GitHub Release 并附带 x64 zip
#   3. 手动 workflow_dispatch
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore & Build (Release x64, framework-dependent)
        run: msbuild OcrTranslator.csproj -p:Configuration=Release -p:Platform=x64 -p:SelfContained=false -p:WindowsAppSDKSelfContained=false -restore

      - name: Zip package
        run: Compress-Archive -Path bin\x64\Release\net10.0-windows10.0.19041.0\* -DestinationPath OcrTranslator_v4_x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OcrTranslator_v4_x64
          path: OcrTranslator_v4_x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OcrTranslator_v4_x64.zip
          generate_release_notes: true
